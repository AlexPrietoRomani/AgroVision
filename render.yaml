# Despliegue del gateway AgroVisión en Render (alternativa a Hugging Face Spaces).
# Render construye el Dockerfile de la raíz (compila Astro + corre el gateway que sirve
# la UI en / y la API en /api en el puerto 8000). Conecta el repo y cada push redespliega.
# El conteo arranca en standby; BYOK (sin secretos en el server: los pone el usuario por sesión).
services:
  - type: web
    name: agrovision
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/status
    envVars:
      - key: COUNTING_ENABLED
        value: "false"            # true cuando el modelo esté publicado
      - key: RATE_LIMIT_PER_MIN
        value: "120"              # rate limiting de /api (0 desactiva)
