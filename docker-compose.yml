# Stack local: el gateway FastAPI sirve la API (/api) Y la UI Astro estática (/).
# (Desde la Fase 8 ya no hay servicio de UI aparte: la imagen del backend compila
#  Astro y lo sirve en /.) El conteo arranca en standby (COUNTING_ENABLED=false).
services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - COUNTING_ENABLED=false
    volumes:
      - ./models:/app/models:ro
      - ./sample_data:/app/sample_data:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')\""]
      interval: 10s
      timeout: 5s
      retries: 5
